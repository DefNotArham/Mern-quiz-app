<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-gradient-to-r from-green-100 via-green-200 to-green-300 min-h-screen flex items-center justify-center p-6"
  >
    <div class="w-full max-w-3xl bg-white rounded-3xl shadow-2xl p-8">
      <!-- Header -->
      <div class="mb-6 text-center">
        <h1 class="text-4xl font-bold text-green-700">Create Quiz</h1>
        <p class="text-gray-500 mt-2">Build your own quiz in seconds</p>
      </div>

      <!-- Quiz Info -->
      <div class="space-y-4 mb-6">
        <input
          type="text"
          placeholder="Quiz Title"
          class="w-full p-3 rounded-xl border focus:ring-2 focus:ring-green-400 outline-none"
        />

        <textarea
          placeholder="Quiz Description"
          class="w-full p-3 rounded-xl border focus:ring-2 focus:ring-green-400 outline-none"
        ></textarea>
      </div>

      <!-- Question Card -->
      <div class="bg-green-50 p-6 rounded-2xl shadow-md mb-6">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-semibold text-green-700">Question 1</h2>
          <span class="text-sm text-gray-400">Edit</span>
        </div>

        <!-- Question -->
        <input
          type="text"
          placeholder="Enter your question"
          class="w-full p-3 mb-4 rounded-xl border focus:ring-2 focus:ring-green-400"
        />

        <!-- Options -->
        <div class="grid grid-cols-2 gap-4">
          <input
            type="text"
            placeholder="Option A"
            class="p-2 rounded-lg border focus:ring-2 focus:ring-green-400"
          />
          <input
            type="text"
            placeholder="Option B"
            class="p-2 rounded-lg border focus:ring-2 focus:ring-green-400"
          />
          <input
            type="text"
            placeholder="Option C"
            class="p-2 rounded-lg border focus:ring-2 focus:ring-green-400"
          />
          <input
            type="text"
            placeholder="Option D"
            class="p-2 rounded-lg border focus:ring-2 focus:ring-green-400"
          />
        </div>

        <!-- Correct Answer -->
        <input
          type="text"
          placeholder="Correct Answer"
          class="w-full mt-4 p-2 rounded-lg border focus:ring-2 focus:ring-green-400"
        />
      </div>

      <!-- Buttons -->
      <div class="space-y-4">
        <!-- Add Question -->
        <button
          class="w-full py-3 rounded-xl border border-green-400 text-green-600 font-medium hover:bg-green-100 transition"
        >
          + Add Another Question
        </button>

        <!-- Submit -->
        <button
          class="w-full py-3 rounded-xl text-white font-semibold bg-gradient-to-r from-green-400 to-green-600 hover:from-green-500 hover:to-green-700 transform hover:-translate-y-1 shadow-md hover:shadow-xl transition"
        >
          Create Quiz
        </button>
      </div>
    </div>
  </body>
</html>
