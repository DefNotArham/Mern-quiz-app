<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Template</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #d4edda, #c8e6c9, #a5d6a7);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .quiz-container {
        background-color: #fff;
        border-radius: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        max-width: 700px;
        width: 100%;
        padding: 40px;
      }

      .quiz-header {
        text-align: center;
        margin-bottom: 30px;
      }

      .quiz-header h1 {
        color: #2e7d32;
        font-size: 36px;
        margin-bottom: 10px;
      }

      .quiz-header p {
        color: #555;
        font-weight: bold;
      }

      .question {
        margin-bottom: 20px;
      }

      .question h2 {
        color: #333;
        font-size: 24px;
        margin-bottom: 15px;
      }

      .options {
        display: grid;
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .option-btn {
        padding: 12px 20px;
        border-radius: 15px;
        border: none;
        background-color: #a5d6a7;
        color: #333;
        font-size: 16px;
        cursor: pointer;
        text-align: left;
        transition: background-color 0.3s ease;
      }

      .option-btn:hover {
        background-color: #81c784;
      }

      .navigation {
        display: flex;
        justify-content: space-between;
        margin-top: 30px;
      }

      .nav-btn {
        padding: 12px 25px;
        border-radius: 15px;
        border: none;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      .prev-btn {
        background-color: #ccc;
        color: #fff;
      }

      .prev-btn:hover {
        background-color: #999;
      }

      .next-btn {
        background-color: #388e3c;
        color: #fff;
      }

      .next-btn:hover {
        background-color: #2e7d32;
      }

      .progress-bar {
        margin-top: 25px;
        background-color: #eee;
        height: 12px;
        border-radius: 6px;
        overflow: hidden;
      }

      .progress {
        height: 12px;
        width: 10%; /* Change dynamically with JS */
        background-color: #388e3c;
        transition: width 0.3s ease;
      }

      .progress-text {
        text-align: right;
        font-size: 14px;
        color: #555;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <div class="quiz-container">
      <div class="quiz-header">
        <h1>Math Quiz</h1>
        <p>Test your skills with 10 challenging math questions!</p>
      </div>

      <div class="question">
        <h2>Question 1: What is 5 + 3?</h2>
        <div class="options">
          <button class="option-btn">A. 6</button>
          <button class="option-btn">B. 8</button>
          <button class="option-btn">C. 9</button>
          <button class="option-btn">D. 10</button>
        </div>
      </div>

      <div class="navigation">
        <button class="nav-btn prev-btn">Previous</button>
        <button class="nav-btn next-btn">Next</button>
      </div>

      <div class="progress-bar">
        <div class="progress"></div>
      </div>
      <div class="progress-text">Question 1 of 10</div>
    </div>
  </body>
</html>
